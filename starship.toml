"$schema" = 'https://starship.rs/config-schema.json'

format = "$directory $character "

right_format = "$git_branch$git_status$time"

add_newline = false

[directory]
truncate_to_repo = true
truncation_length = 4
format = "[$path]($style)"
style = "bold blue"
repo_root_style = "bold yellow"

[character]
success_symbol = "[‚ěú](bold green)"
error_symbol = "[‚ěú](bold red)"
vimcmd_symbol = "[‚ěú](bold blue)"

[git_branch]
only_attached = true
symbol = "Óā† "
format = "[$symbol$branch]($style) "
style = "bold purple"

[git_status]
format = "([$all_status$ahead_behind]($style)) "
style = "bold yellow"

[time]
disabled = false
format = "[ ÔÄó  $time ]($style)"
time_format = "%H:%M"
style = "bold cyan"
